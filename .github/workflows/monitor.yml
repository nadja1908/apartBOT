name: Rent Valley Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: rentvalley-seen-v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Seed ako nema stanja
        run: |
          if [ ! -f seen_ids.json ]; then
            cp seen_ids.seed.json seen_ids.json 2>/dev/null || python monitor.py --seed
          fi
        env:
          DATA_DIR: ${{ github.workspace }}

      - name: Provera novih oglasa
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          THRE_MAX_HIRE_EUR: ${{ vars.THRE_MAX_HIRE_EUR }}
          DATA_DIR: ${{ github.workspace }}
